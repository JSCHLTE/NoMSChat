<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      padding: 10px;
      width: 200px;
      background-color: #05091D;
      color: #fff;
      font-size: 16px;
    }

    h3 {
      margin-bottom: 10px;
    }

    a {
      color: #00FFF9;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 25px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background-color: #ccc;
      border-radius: 25px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 19px;
      width: 19px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }
  </style>
</head>
<body>
  <h3>NoMSChat</h3>
  <p>Removes the toxic chat from meth and crack streams.</p>
  <p>Toggle on or off below.</p>

  <label class="switch">
    <input type="checkbox" id="toggle">
    <span class="slider"></span>
  </label>

  <p><a href="https://github.com/JSCHLTE/NoMSChat" target="_blank" rel="noreferrer">GitHub</a></p>

  <script src="popup.js"></script>
</body>
</html>
